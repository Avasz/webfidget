<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collision | Web Fidget</title>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZRVXXK6GYF"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-ZRVXXK6GYF');
    </script>
    <style>
        :root {
            --bg-color: #0b0c10;
            --accent: #66fcf1;
            --accent-dim: #45a29e;
            --panel-bg: rgba(11, 12, 16, 0.4);
            --text-color: #c5c6c7;
        }

        * { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1000;
        }
        
        #ui-content {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            height: 100%;
            padding: 10px;
            padding-bottom: 25px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid rgba(102, 252, 241, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 12px;
            padding: 8px 12px;
            pointer-events: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
            align-items: stretch;
            width: 100%;
            max-width: 800px;
        }

        .brand-title {
            text-align: center;
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 4px;
            font-size: 14px;
            margin: 0;
            margin-bottom: 6px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .inputs-row {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .brand-link {
            text-align: center;
            color: var(--accent-dim);
            text-decoration: none;
            font-size: 11px;
            font-weight: bold;
            padding-top: 6px;
            border-top: 1px solid rgba(102, 252, 241, 0.12);
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        
        .brand-link:hover { color: var(--accent); }

        #bottomUiWrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            width: 100%;
        }

        .stats {
            display: flex;
            gap: 15px;
            min-width: 250px;
            justify-content: center;
        }

        .stat-row {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        .stat-label {
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 10px;
            margin-bottom: 4px;
        }

        .stat-value {
            color: var(--accent);
            font-weight: bold;
            font-size: 14px;
            text-shadow: 0 0 5px rgba(102, 252, 241, 0.5);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .input-group .stat-label { margin-bottom: 4px; }

        .input-styled {
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(102, 252, 241, 0.3);
            color: var(--accent);
            padding: 4px;
            text-align: center;
            border-radius: 6px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            font-size: 13px;
            width: 60px;
            height: 28px;
            outline: none;
            transition: all 0.2s;
        }
        
        select.input-styled {
            width: auto;
            min-width: 90px;
            cursor: pointer;
            padding: 4px 6px;
        }
        select.input-styled option {
            background: var(--bg-color);
            color: var(--accent);
        }

        .input-styled:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
            background: rgba(0,0,0,0.8);
        }
        
        /* Actions Layout within flow */
        #action-layer {
            display: flex;
            gap: 12px;
            pointer-events: auto;
            justify-content: center;
        }

        .icon-btn {
            background: var(--panel-bg);
            border: 1px solid var(--accent);
            color: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s;
            padding: 10px;
            backdrop-filter: blur(8px);
        }
        
        .icon-btn svg { width: 100%; height: 100%; fill: currentColor; }

        .icon-btn:hover {
            background: var(--accent);
            color: var(--bg-color);
            transform: scale(1.05);
        }
        
        .icon-btn:active { transform: scale(0.95); }

        .icon-btn.btn-danger { color: #ff4d4d; border-color: #ff4d4d; }
        .icon-btn.btn-danger:hover { background: #ff4d4d; color: var(--bg-color); }

        /* Modal Overlay */
        #reportModal {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            display: none;
            text-align: center;
            min-width: 320px;
            z-index: 2000;
            padding: 30px;
            pointer-events: auto;
        }
        
        #reportModal h2 { margin-top: 0; color: var(--accent); margin-bottom: 5px; }
        
        #reportModal .modal-src {
            color: #aaa; text-decoration: none; font-size: 12px;
            margin-bottom: 20px; display: inline-block;
        }
        #reportModal .modal-src:hover { color: var(--accent); }

        #reportModal p {
            margin: 10px 0; display: flex; justify-content: space-between;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;
        }

        button.action {
            background: transparent; color: var(--accent);
            border: 2px solid var(--accent); padding: 10px 16px;
            border-radius: 8px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
            width: 100%; margin-top: 25px;
        }
        button.action:hover {
            background: var(--accent); color: var(--bg-color);
            box-shadow: 0 0 20px rgba(102, 252, 241, 0.4);
        }

        @media (max-width: 800px) {
            #ui-content { padding: 6px; padding-bottom: 20px; }
            .inputs-row { padding-bottom: 3px; gap: 8px; display: grid; grid-template-columns: repeat(2, 1fr); max-width: 320px; margin: 0 auto; }
            .panel { padding: 10px 8px; }
            .stats { flex-wrap: wrap; gap: 8px; }
            .stat-row {
                background: rgba(0,0,0,0.3);
                border: 1px solid rgba(102, 252, 241, 0.1);
                padding: 4px 10px;
                border-radius: 6px;
            }
            .input-styled { width: 100%; max-width: 100px; }
        }
    </style>
</head>
<body>
    <canvas id="simCanvas"></canvas>

    <div id="ui-layer">
        <div id="ui-content">
            <div class="panel controls" id="controlsWrap">
                <h1 class="brand-title">Collision</h1>
                <div class="inputs-row">
                    <div class="input-group">
                        <span class="stat-label">Shape</span>
                        <select id="shapeInput" class="input-styled">
                             <option value="circle">Circle</option>
                             <option value="3">Triangle</option>
                             <option value="rectangle">Rectangle</option>
                             <option value="4">Square</option>
                             <option value="rhombus">Rhombus</option>
                             <option value="parallelogram">Parallelo</option>
                             <option value="trapezoid">Trapezoid</option>
                             <option value="right-triangle">Right Tri</option>
                             <option value="5">Pentagon</option>
                             <option value="6">Hexagon</option>
                             <option value="7">Heptagon</option>
                             <option value="8">Octagon</option>
                             <option value="10">Decagon</option>
                             <option value="12">12-gon</option>
                             <option value="14">14-gon</option>
                             <option value="16">16-gon</option>
                        </select>
                    </div>
                    
                    <div class="input-group">
                        <span class="stat-label">Max Balls</span>
                        <input type="number" id="maxBallsInput" class="input-styled" value="100" min="2" max="1000">
                    </div>
                    <div class="input-group">
                        <span class="stat-label">Spawn/Sec</span>
                        <input type="number" id="spawnRateInput" class="input-styled" value="20" min="1" max="1000">
                    </div>
                    <div class="input-group">
                        <span class="stat-label">Size %</span>
                        <input type="number" id="sizeInput" class="input-styled" value="100" min="10" max="500" step="10">
                    </div>
                    <div class="input-group" style="grid-column: 1 / -1; margin-top: -4px;">
                        <span class="stat-label">Speed %</span>
                        <input type="number" id="speedInput" class="input-styled" value="100" min="10" max="500" step="10" style="max-width: 150px;">
                    </div>
                </div>
                <a href="https://avasz.github.io/webfidget" target="_blank" class="brand-link">avasz.github.io/webfidget</a>
            </div>
            
            <div id="canvas-spacer" style="flex-grow: 1;"></div>
            
            <div id="bottomUiWrap">
                <div id="action-layer" style="display: none;">
                    <button id="resetBtn" class="icon-btn" title="Restart">
                        <svg viewBox="0 0 24 24"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                    </button>
                    <button id="pauseBtn" class="icon-btn" title="Pause">
                        <svg id="icon-pause" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                        <svg id="icon-play" viewBox="0 0 24 24" style="display:none;"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                    <button id="stopBtn" class="icon-btn btn-danger" title="Stop">
                        <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
                    </button>
                </div>
                
                <div class="panel stats" id="statsWrap">
                    <div class="stat-row">
                        <span class="stat-label">Time</span>
                        <span class="stat-value" id="timeStat">0.0s</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">FPS</span>
                        <span class="stat-value" id="fpsStat">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Balls</span>
                        <span class="stat-value" id="ballsStat">0</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Hits</span>
                        <span class="stat-value" id="collisionsStat">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Report Modal remains absolutely centered! -->
    <div id="reportModal" class="panel">
        <h2>Report</h2>
        <a href="https://avasz.github.io/webfidget" target="_blank" class="modal-src">avasz.github.io/webfidget</a>
        
        <p>Execution Time:<span id="repTime" class="stat-value"></span></p>
        <p>Peak FPS:<span id="repFps" class="stat-value"></span></p>
        <p>Total Generated:<span id="repGen" class="stat-value"></span></p>
        <p>Active Balls:<span id="repBalls" class="stat-value"></span></p>
        <p>Total Hits:<span id="repCol" class="stat-value"></span></p>
        <button id="closeReportBtn" class="action">PLAY AGAIN</button>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        
        const timeStat = document.getElementById('timeStat');
        const fpsStat = document.getElementById('fpsStat');
        const ballsStat = document.getElementById('ballsStat');
        const collisionsStat = document.getElementById('collisionsStat');
        
        const controlsWrap = document.getElementById('controlsWrap');
        const bottomUiWrap = document.getElementById('bottomUiWrap');
        const actionLayer = document.getElementById('action-layer');
        
        const resetBtn = document.getElementById('resetBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const stopBtn = document.getElementById('stopBtn');
        const iconPause = document.getElementById('icon-pause');
        const iconPlay = document.getElementById('icon-play');
        
        const shapeInput = document.getElementById('shapeInput');
        const maxBallsInput = document.getElementById('maxBallsInput');
        const speedInput = document.getElementById('speedInput');
        const spawnRateInput = document.getElementById('spawnRateInput');
        const sizeInput = document.getElementById('sizeInput');
        
        const reportModal = document.getElementById('reportModal');
        const closeReportBtn = document.getElementById('closeReportBtn');

        let hasStarted = false, isPaused = false, isReportShowing = false;
        let balls = [], totalCollisions = 0, totalGenerated = 0;
        let animationId, spawnTimestamps = []; 

        const isMobileScreen = window.innerWidth <= 800;
        let baseRadius = isMobileScreen ? 3 : 8;
        let baseInitialSpeed = isMobileScreen ? 3 : 5;
        let baseSpawnSpeed = isMobileScreen ? 2 : 3;
        
        let currentShape = 'circle';
        let boundaryEdges = [];
        let maxBalls = 100, maxSpawnsPerSecond = 20, timeScale = 1.0, currentRadius = baseRadius;

        let centerX, centerY, boundaryRadius;
        const collisionCooldownFrames = 10;

        let lastTimestamp = 0, simTimeElapsed = 0, frameCount = 0;
        let lastFpsUpdate = 0, currentFps = 0, peakFps = 0;

        maxBallsInput.addEventListener('input', () => { maxBalls = parseInt(maxBallsInput.value) || 100; });
        spawnRateInput.addEventListener('input', () => { maxSpawnsPerSecond = parseInt(spawnRateInput.value) || 20; });
        
        speedInput.addEventListener('input', () => { 
            timeScale = (parseInt(speedInput.value) || 100) / 100; 
        });

        sizeInput.addEventListener('input', () => { 
            currentRadius = Math.max(1, baseRadius * ((parseInt(sizeInput.value) || 100) / 100));
            for(let b of balls) { b.radius = currentRadius; }
            if(!hasStarted && !isReportShowing && balls.length === 0) draw();
        });

        shapeInput.addEventListener('change', () => {
            currentShape = shapeInput.value;
            // Force pure resize propagation to visually show the shape change prior to starting tracking!
            resize(); 
        });
        
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        // Restored EXACT audio dual osc array!
        function playSound(type, param=0) {
            if (!audioCtx || audioCtx.state !== 'running') return;
            if (type === 'boundary') {
                const frequencies = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33, 659.25, 783.99, 880.00];
                let normAngle = (param + Math.PI) / (2 * Math.PI); 
                let noteIndex = Math.floor(normAngle * frequencies.length);
                if (noteIndex >= frequencies.length) noteIndex = frequencies.length - 1;
                
                const baseFreq = frequencies[noteIndex];

                const now = audioCtx.currentTime;
                const osc = audioCtx.createOscillator();
                const osc2 = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                osc2.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(baseFreq, now);
                osc2.type = 'triangle'; 
                osc2.frequency.setValueAtTime(baseFreq * 2.02, now);

                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.3, now + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                
                osc.start(now);
                osc2.start(now);
                osc.stop(now + 0.8);
                osc2.stop(now + 0.8);
            }
        }

        function getBoundaryShapePoints(type, cx, cy, radius) {
            if (type === 'circle') return null;
            let points = [];
            const cc = (x,y) => ({ x: cx + x * radius, y: cy + y * radius });
            
            if (!isNaN(parseInt(type))) {
                const sides = parseInt(type);
                const startAngle = -Math.PI / 2; 
                for(let i=0; i<sides; i++) {
                    const a = startAngle + (Math.PI * 2 * i) / sides;
                    points.push({ x: cx + Math.cos(a)*radius, y: cy + Math.sin(a)*radius });
                }
            } else if (type === 'rectangle') {
                points = [ cc(-1, -0.6), cc(1, -0.6), cc(1, 0.6), cc(-1, 0.6) ]; 
            } else if (type === 'rhombus') {
                points = [ cc(0, -1), cc(0.8, 0), cc(0, 1), cc(-0.8, 0) ]; 
            } else if (type === 'parallelogram') {
                points = [ cc(-0.6, -0.6), cc(1, -0.6), cc(0.6, 0.6), cc(-1, 0.6) ]; 
            } else if (type === 'trapezoid') {
                points = [ cc(-0.5, -0.6), cc(0.5, -0.6), cc(0.9, 0.6), cc(-0.9, 0.6) ]; 
            } else if (type === 'right-triangle') {
                points = [ cc(-0.8, -0.8), cc(0.8, 0.8), cc(-0.8, 0.8) ]; 
            }
            return points;
        }

        function updateBoundaryEdges() {
            boundaryEdges = [];
            const pts = getBoundaryShapePoints(currentShape, centerX, centerY, boundaryRadius);
            if (!pts) return;
            
            for(let i=0; i<pts.length; i++) {
                const p1 = pts[i];
                const p2 = pts[(i+1)%pts.length];
                let dx = p2.x - p1.x;
                let dy = p2.y - p1.y;
                let len = Math.hypot(dx, dy);
                
                let nx = -dy / len;
                let ny = dx / len;
                boundaryEdges.push({ p1, p2, nx, ny, len, dx, dy });
            }
        }

        class Ball {
            constructor(x, y, vx, vy) {
                this.id = Math.random().toString(36).substr(2, 9);
                this.x = x; this.y = y; this.vx = vx; this.vy = vy;
                this.radius = currentRadius; 
                this.cooldowns = new Map();
                this.color = `hsl(${Math.random() * 360}, 100%, 65%)`;
                this.mass = 1;
            }
            update() {
                this.x += this.vx * timeScale;
                this.y += this.vy * timeScale;
                for (let [id, frames] of this.cooldowns.entries()) {
                    if (frames <= 1) this.cooldowns.delete(id);
                    else this.cooldowns.set(id, frames - timeScale);
                }
            }
            draw(ctx) {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color; ctx.fill();
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const ctrlsRect = controlsWrap.getBoundingClientRect();
            const botRect = bottomUiWrap.getBoundingClientRect();
            
            const topUiHeight = ctrlsRect.bottom;
            const botUiHeight = canvas.height - botRect.top;
            
            centerX = canvas.width / 2;
            const clearHeightSpace = canvas.height - topUiHeight - botUiHeight;
            centerY = topUiHeight + (clearHeightSpace / 2);
            
            boundaryRadius = Math.min((canvas.width / 2) - 15, (clearHeightSpace / 2) - 10);
            if (boundaryRadius < 30) boundaryRadius = 30; 
            
            updateBoundaryEdges();
            if (!hasStarted) draw(); 
        }

        window.addEventListener('resize', resize);
        setTimeout(resize, 100);
        
        function spawnBall(x, y, speedLimit) {
            if (balls.length >= maxBalls) return null;
            const angle = Math.random() * Math.PI * 2;
            const speed = Math.random() * speedLimit + 1;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const newBall = new Ball(x, y, vx, vy);
            balls.push(newBall); totalGenerated++;
            return newBall;
        }

        function triggerEmptyStart() {
            initAudio(); 
            hasStarted = true; isPaused = false; isReportShowing = false;
            
            balls = []; totalCollisions = 0; totalGenerated = 0;
            simTimeElapsed = 0; peakFps = 0; spawnTimestamps = [];
            lastTimestamp = performance.now();
            
            actionLayer.style.display = 'flex';
            iconPlay.style.display = 'none';
            iconPause.style.display = 'block';
            
            maxBalls = parseInt(maxBallsInput.value) || 100;
            timeScale = (parseInt(speedInput.value) || 100) / 100;
            maxSpawnsPerSecond = parseInt(spawnRateInput.value) || 20;
            currentRadius = baseRadius * ((parseInt(sizeInput.value) || 100) / 100);
            currentShape = shapeInput.value;
            
            resize(); 
            spawnBall(centerX, centerY, baseInitialSpeed);
            spawnBall(centerX + 15, centerY, baseInitialSpeed);
        }

        function initSimulation() {
            triggerEmptyStart();
            requestAnimationFrame(loop);
        }

        resetBtn.addEventListener('click', () => {
            if (!hasStarted) return;
            // Purges state and instantly respawns fresh starting balls without triggering metrics modal
            triggerEmptyStart();
        });

        pauseBtn.addEventListener('click', () => {
            if (!hasStarted) return;
            isPaused = !isPaused;
            if (isPaused) {
                iconPause.style.display = 'none'; iconPlay.style.display = 'block';
            } else {
                iconPause.style.display = 'block'; iconPlay.style.display = 'none';
                lastTimestamp = performance.now();
                requestAnimationFrame(loop);
            }
        });

        stopBtn.addEventListener('click', () => {
            if (!hasStarted) return;
            hasStarted = false; isPaused = false; isReportShowing = true;
            actionLayer.style.display = 'none';
            
            document.getElementById('repTime').textContent = (simTimeElapsed / 1000).toFixed(1) + "s";
            document.getElementById('repFps').textContent = peakFps;
            document.getElementById('repGen').textContent = totalGenerated;
            document.getElementById('repBalls').textContent = balls.length;
            document.getElementById('repCol').textContent = totalCollisions;
            
            reportModal.style.display = 'block';
            resize(); draw(); 
        });

        closeReportBtn.addEventListener('click', () => {
            reportModal.style.display = 'none';
            isReportShowing = false;
            timeStat.textContent = '0.0s'; ballsStat.textContent = '0';
            fpsStat.textContent = '0'; collisionsStat.textContent = '0';
            draw(); resize();
        });

        canvas.addEventListener('click', (e) => {
            if (!hasStarted && !isReportShowing && e.target.tagName === 'CANVAS') {
                initSimulation();
            }
        });

        function handleBoundaryCollision(ball) {
            if (currentShape === 'circle') {
                const dx = ball.x - centerX; const dy = ball.y - centerY;
                const distSq = dx * dx + dy * dy; const maxDist = boundaryRadius - ball.radius;

                if (distSq > maxDist * maxDist) {
                    const dist = Math.sqrt(distSq);
                    const nx = dx / dist; const ny = dy / dist;

                    ball.x = centerX + nx * maxDist; ball.y = centerY + ny * maxDist;
                    const dotProduct = ball.vx * nx + ball.vy * ny;
                    ball.vx = ball.vx - 2 * dotProduct * nx; ball.vy = ball.vy - 2 * dotProduct * ny;
                    
                    playSound('boundary', Math.atan2(ny, nx)); // correctly calculate reflection pitch angle!
                    
                    const speedSq = ball.vx * ball.vx + ball.vy * ball.vy;
                    const MaxSpeedSq = 80; 
                    if(speedSq > MaxSpeedSq) {
                        const speed = Math.sqrt(speedSq);
                        ball.vx = (ball.vx / speed) * Math.sqrt(MaxSpeedSq);
                        ball.vy = (ball.vy / speed) * Math.sqrt(MaxSpeedSq);
                    }
                }
            } else {
                // Polygon Boundary Engine
                for (let edge of boundaryEdges) {
                    let bx = ball.x - edge.p1.x;
                    let by = ball.y - edge.p1.y;
                    
                    let dist = bx * edge.nx + by * edge.ny;
                    
                    if (dist < ball.radius) {
                        let dotSegment = bx * (edge.dx/edge.len) + by * (edge.dy/edge.len);

                        if (dotSegment >= 0 && dotSegment <= edge.len) {
                            let overlap = ball.radius - dist;
                            ball.x += edge.nx * overlap;
                            ball.y += edge.ny * overlap;
                            
                            let dotV = ball.vx * edge.nx + ball.vy * edge.ny;
                            if (dotV < 0) {
                                ball.vx -= 2 * dotV * edge.nx;
                                ball.vy -= 2 * dotV * edge.ny;
                                playSound('boundary', Math.atan2(edge.ny, edge.nx)); 
                            }
                        } else {
                            let corner = dotSegment < 0 ? edge.p1 : edge.p2;
                            let cx = ball.x - corner.x;
                            let cy = ball.y - corner.y;
                            let cDistSq = cx*cx + cy*cy;
                            
                            if (cDistSq > 0 && cDistSq < ball.radius*ball.radius) {
                                let cDist = Math.sqrt(cDistSq);
                                let overlap = ball.radius - cDist;
                                let cnx = cx / cDist; let cny = cy / cDist;
                                
                                ball.x += cnx * overlap;
                                ball.y += cny * overlap;
                                
                                let dotV = ball.vx * cnx + ball.vy * cny;
                                if (dotV < 0) {
                                    ball.vx -= 2 * dotV * cnx;
                                    ball.vy -= 2 * dotV * cny;
                                    playSound('boundary', Math.atan2(cny, cnx));
                                }
                            }
                        }
                    }
                }
            }
        }

        function handleBallCollisions(now) {
            let newlySpawned = [];
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    const b1 = balls[i]; const b2 = balls[j];
                    const dx = b2.x - b1.x; const dy = b2.y - b1.y;
                    const distSq = dx * dx + dy * dy;
                    const minDist = b1.radius + b2.radius; 

                    if (distSq < minDist * minDist) {
                        const dist = Math.sqrt(distSq);
                        if (dist === 0) continue; 
                        
                        const overlap = minDist - dist;
                        const nx = dx / dist; const ny = dy / dist;

                        const correctionX = nx * (overlap / 2); const correctionY = ny * (overlap / 2);
                        b1.x -= correctionX; b1.y -= correctionY;
                        b2.x += correctionX; b2.y += correctionY;

                        if (!b1.cooldowns.has(b2.id) && !b2.cooldowns.has(b1.id)) {
                            const kx = b1.vx - b2.vx; const ky = b1.vy - b2.vy;
                            const p = 2 * (nx * kx + ny * ky) / (b1.mass + b2.mass);
                            
                            b1.vx = b1.vx - p * b2.mass * nx; b1.vy = b1.vy - p * b2.mass * ny;
                            b2.vx = b2.vx + p * b1.mass * nx; b2.vy = b2.vy + p * b1.mass * ny;

                            b1.cooldowns.set(b2.id, collisionCooldownFrames);
                            b2.cooldowns.set(b1.id, collisionCooldownFrames);
                            totalCollisions++;

                            if ((balls.length + newlySpawned.length < maxBalls) && 
                                (spawnTimestamps.length < maxSpawnsPerSecond)) {
                                
                                const spawnX = b1.x + nx * b1.radius; const spawnY = b1.y + ny * b1.radius;
                                const newBall = new Ball(
                                    spawnX, spawnY, 
                                    (Math.random() - 0.5) * baseSpawnSpeed, 
                                    (Math.random() - 0.5) * baseSpawnSpeed
                                );
                                
                                newBall.cooldowns.set(b1.id, collisionCooldownFrames);
                                newBall.cooldowns.set(b2.id, collisionCooldownFrames);
                                b1.cooldowns.set(newBall.id, collisionCooldownFrames);
                                b2.cooldowns.set(newBall.id, collisionCooldownFrames);
                                
                                newlySpawned.push(newBall);
                                totalGenerated++; spawnTimestamps.push(now);
                            }
                        }
                    }
                }
            }
            if (newlySpawned.length > 0) balls.push(...newlySpawned);
        }

        function update(now) {
            for (let ball of balls) {
                ball.update(); handleBoundaryCollision(ball);
            }
            handleBallCollisions(now);
            
            ballsStat.textContent = balls.length; collisionsStat.textContent = totalCollisions;
            timeStat.textContent = (simTimeElapsed / 1000).toFixed(1) + "s";
        }

        function drawBoundary() {
            ctx.beginPath();
            if (currentShape === 'circle') {
                ctx.arc(centerX, centerY, boundaryRadius, 0, Math.PI * 2);
            } else {
                const pts = getBoundaryShapePoints(currentShape, centerX, centerY, boundaryRadius);
                if (pts && pts.length > 0) {
                    ctx.moveTo(pts[0].x, pts[0].y);
                    for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                    ctx.closePath();
                }
            }
            ctx.strokeStyle = 'rgba(102, 252, 241, 0.4)'; ctx.lineWidth = 3; ctx.stroke();
            ctx.shadowColor = 'rgba(102, 252, 241, 0.5)';
            ctx.shadowBlur = 20; ctx.stroke(); ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.fillStyle = 'rgba(11, 12, 16, 0.3)'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawBoundary();

            if (!hasStarted && !isReportShowing) {
                ctx.fillStyle = 'rgba(102, 252, 241, 0.7)';
                const fSize = Math.max(20, boundaryRadius / 5);
                ctx.font = `bold ${fSize}px 'Segoe UI', sans-serif`;
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                ctx.fillText("▶ START", centerX, centerY); 
                
                ctx.beginPath();
                if (currentShape === 'circle') {
                    ctx.arc(centerX, centerY, (Math.sin(performance.now()/300)*10) + boundaryRadius/2.8, 0, Math.PI*2);
                } else {
                    const dynamicRadius = (Math.sin(performance.now()/300)*10) + boundaryRadius/2.8;
                    const pts = getBoundaryShapePoints(currentShape, centerX, centerY, dynamicRadius);
                    if(pts && pts.length > 0) {
                        ctx.moveTo(pts[0].x, pts[0].y);
                        for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
                        ctx.closePath();
                    }
                }
                ctx.strokeStyle = 'rgba(102, 252, 241, 0.1)'; ctx.lineWidth = 2; ctx.stroke();
            }

            if (hasStarted) {
                for (let ball of balls) ball.draw(ctx);
            }
        }

        function loop(timestamp) {
            if (!hasStarted || isPaused) return;
            const dt = timestamp - lastTimestamp; lastTimestamp = timestamp;
            simTimeElapsed += dt;

            spawnTimestamps = spawnTimestamps.filter(t => performance.now() - t < 1000);
            frameCount++;
            if (timestamp - lastFpsUpdate >= 1000) {
                currentFps = Math.round((frameCount * 1000) / (timestamp - lastFpsUpdate));
                if (currentFps > peakFps) peakFps = currentFps;
                fpsStat.textContent = currentFps; frameCount = 0; lastFpsUpdate = timestamp;
            }

            update(performance.now()); draw();
            animationId = requestAnimationFrame(loop);
        }
    </script>
</body>
